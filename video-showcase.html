<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="referrer" content="never">
    <title>特发地产产业项目介绍</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a365d;
            --secondary: #2c5282;
            --accent: #3182ce;
            --gold: #d69e2e;
            --bg-light: #f7fafc;
            --text-dark: #1a202c;
            --text-gray: #4a5568;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
        }
        .site-header {
            background: linear-gradient(135deg, #5a8bc7 0%, #7aa3cc 100%);
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }
        .site-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--gold));
        }
        .site-header .logo {
            height: 40px;
            width: auto;
            flex-shrink: 0;
        }
        .header-content {
            flex: 1;
            text-align: center;
        }
        .header-content h1 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .header-content p {
            font-size: 0.75rem;
            opacity: 0.95;
        }
        .nav-tabs {
            background: white;
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-inner {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .nav-inner::-webkit-scrollbar { display: none; }
        .nav-tab {
            flex-shrink: 0;
            padding: 10px 20px;
            border: none;
            background: var(--bg-light);
            color: var(--text-gray);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 20px;
            white-space: nowrap;
        }
        .nav-tab.active {
            background: var(--primary);
            color: white;
        }
        .container {
            padding: 16px;
            max-width: 750px;
            margin: 0 auto;
        }
        .project-content {
            display: none;
        }
        .project-content.active {
            display: block;
        }
        .video-section {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .video-wrap {
            position: relative;
            width: 100%;
            background: #000;
            padding-top: 56.25%;
        }
        .video-wrap video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            z-index: 10;
        }
        .play-overlay.hidden {
            display: none;
        }
        .play-btn {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .play-btn:active {
            transform: scale(1.1);
        }
        .play-btn svg {
            width: 30px;
            height: 30px;
            margin-left: 5px;
        }
        .video-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .video-placeholder svg {
            width: 72px;
            height: 72px;
            margin-bottom: 14px;
        }
        .video-placeholder .placeholder-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .video-placeholder .placeholder-subtitle {
            font-size: 0.85rem;
            opacity: 0.8;
        }
        .video-info {
            padding: 14px 16px;
        }
        .video-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 6px;
        }
        .video-meta {
            font-size: 0.78rem;
            color: var(--text-gray);
        }
        footer {
            background: linear-gradient(135deg, #5a8bc7 0%, #7aa3cc 100%);
            color: white;
            text-align: center;
            padding: 16px;
            font-size: 0.75rem;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <img src="logo.png" alt="特发地产" class="logo">
        <div class="header-content">
            <h1>特发地产产业项目介绍</h1>
            <p>携手共进 · 共创未来</p>
        </div>
    </header>

    <nav class="nav-tabs">
        <div class="nav-inner">
            <button class="nav-tab active" data-project="0">鹅公岭项目</button>
            <button class="nav-tab" data-project="1">田心项目</button>
            <button class="nav-tab" data-project="2">坪地北项目</button>
            <button class="nav-tab" data-project="3">辅城坳项目</button>
        </div>
    </nav>

    <main class="container">
        <div class="project-content active" id="project-content-0">
            <div class="video-section">
                <div class="video-wrap">
                    <video id="video-0" playsinline webkit-playsinline x5-video-player-type="h5" x5-video-orientation="portrait" x5-playsinline>
                        <source src="鹅公岭项目_h264.mp4" type="video/mp4">
                    </video>
                    <div class="play-overlay" id="overlay-0">
                        <div class="play-btn" onclick="playVideo(0)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#1a365d" stroke-width="2">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="video-info">
                    <div class="video-title">鹅公岭产业升级项目</div>
                    <div class="video-meta">2026年</div>
                </div>
            </div>
        </div>

        <div class="project-content" id="project-content-1">
            <div class="video-section">
                <div class="video-wrap">
                    <div class="video-placeholder">
                        <svg viewBox="0 0 64 64" fill="none">
                            <circle cx="32" cy="32" r="30" fill="rgba(26,54,93,0.8)"/>
                            <path d="M22 44V20l20 12-20 12z" fill="white"/>
                        </svg>
                        <span class="placeholder-title">田心产业升级项目</span>
                        <span class="placeholder-subtitle">视频即将上线</span>
                    </div>
                </div>
                <div class="video-info">
                    <div class="video-title">田心产业升级项目</div>
                    <div class="video-meta">即将上线</div>
                </div>
            </div>
        </div>

        <div class="project-content" id="project-content-2">
            <div class="video-section">
                <div class="video-wrap">
                    <div class="video-placeholder">
                        <svg viewBox="0 0 64 64" fill="none">
                            <circle cx="32" cy="32" r="30" fill="rgba(26,54,93,0.8)"/>
                            <path d="M22 44V20l20 12-20 12z" fill="white"/>
                        </svg>
                        <span class="placeholder-title">坪地北产业升级项目</span>
                        <span class="placeholder-subtitle">视频即将上线</span>
                    </div>
                </div>
                <div class="video-info">
                    <div class="video-title">坪地北产业升级项目</div>
                    <div class="video-meta">即将上线</div>
                </div>
            </div>
        </div>

        <div class="project-content" id="project-content-3">
            <div class="video-section">
                <div class="video-wrap">
                    <div class="video-placeholder">
                        <svg viewBox="0 0 64 64" fill="none">
                            <circle cx="32" cy="32" r="30" fill="rgba(26,54,93,0.8)"/>
                            <path d="M22 44V20l20 12-20 12z" fill="white"/>
                        </svg>
                        <span class="placeholder-title">辅城坳产业升级项目</span>
                        <span class="placeholder-subtitle">视频即将上线</span>
                    </div>
                </div>
                <div class="video-info">
                    <div class="video-title">辅城坳产业升级项目</div>
                    <div class="video-meta">即将上线</div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>特发地产产业项目介绍 · SDRE · 2026</p>
    </footer>

    <script>
        var tabs = document.querySelectorAll('.nav-tab');
        var contents = document.querySelectorAll('.project-content');
        var videos = document.querySelectorAll('video');

        tabs.forEach(function(tab) {
            tab.addEventListener('click', function() {
                var projectId = parseInt(this.dataset.project);
                tabs.forEach(function(t) { t.classList.remove('active'); });
                contents.forEach(function(c) { c.classList.remove('active'); });
                videos.forEach(function(v) { v.pause(); });
                document.querySelectorAll('.play-overlay').forEach(function(o) { o.classList.remove('hidden'); });
                this.classList.add('active');
                contents[projectId].classList.add('active');
            });
        });

        function playVideo(id) {
            var video = document.getElementById('video-' + id);
            var overlay = document.getElementById('overlay-' + id);
            if (video) {
                video.play();
                overlay.classList.add('hidden');
            }
        }

        videos.forEach(function(video) {
            video.addEventListener('pause', function() {
                var id = this.id.replace('video-', '');
                document.getElementById('overlay-' + id).classList.remove('hidden');
            });
            video.addEventListener('ended', function() {
                var id = this.id.replace('video-', '');
                document.getElementById('overlay-' + id).classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
